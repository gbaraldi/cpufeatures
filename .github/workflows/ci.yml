name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # x86_64 Linux build + test
  build-linux-x86:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [g++, clang++]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Build library
        run: make lib CXX=${{ matrix.compiler }}
      - name: Build and run tests
        run: make test CXX=${{ matrix.compiler }}

  # AArch64 Linux build + test (cross-compiled, test via QEMU)
  build-linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu qemu-user-static
      - name: Build library
        run: make lib CXX=aarch64-linux-gnu-g++ ARCH=aarch64
      - name: Build test
        run: make build/test_standalone CXX=aarch64-linux-gnu-g++ ARCH=aarch64
      - name: Run test under QEMU
        run: qemu-aarch64-static -L /usr/aarch64-linux-gnu build/test_standalone

  # RISC-V 64 Linux build (cross-compiled)
  build-linux-riscv64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-riscv64-linux-gnu qemu-user-static
      - name: Build library
        run: make lib CXX=riscv64-linux-gnu-g++ ARCH=riscv64
      - name: Build test
        run: make build/test_standalone CXX=riscv64-linux-gnu-g++ ARCH=riscv64
      - name: Run test under QEMU
        run: qemu-riscv64-static -L /usr/riscv64-linux-gnu build/test_standalone || echo "QEMU test skipped (may need newer QEMU)"

  # Windows x86_64 build + test (native, MSYS2 UCRT64)
  build-windows-x86:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-toolchain
      - name: Build library
        run: make lib
      - name: Build and run tests
        run: make test

  # Windows AArch64 build + test (native ARM runner, MSYS2 CLANGARM64)
  build-windows-aarch64:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            make
            mingw-w64-clang-aarch64-toolchain
      - name: Build library
        run: make lib CXX=clang++ AR=llvm-ar ARCH=aarch64
      - name: Build and run tests
        run: make test CXX=clang++ AR=llvm-ar ARCH=aarch64

  # macOS x86_64
  build-macos-x86:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: make test

  # macOS AArch64 (Apple Silicon)
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: make test

  # Check that committed tables are up to date
  check-generated:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate tables
        run: make -f Makefile.generate
      - name: Check for differences
        run: |
          if ! git diff --exit-code generated/; then
            echo "::error::Generated tables are out of date. Run: make -f Makefile.generate"
            exit 1
          fi
